    var tTiss = above.map(function(i) { return GENE_ZPCT[i].toFixed(1); });

    Plotly.restyle(gd, {'cells.values': [[tGene, tDeg, tBtwn, tTiss, tMem]]}, [TABLE_IDX]);

    var foundIdx = -1;
